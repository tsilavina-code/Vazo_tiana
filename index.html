<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Ourson Interactif 💕</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; }
body { 
  font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif; 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  min-height: 100vh; 
  padding: 15px; 
}

.container { 
  width: 100%; 
  max-width: 500px; 
  margin: auto;
}

.scene { 
  position: relative; 
  width: 100%; 
  min-height: 80vh;
  display: flex; 
  justify-content: center; 
  align-items: center; 
  flex-direction: column;
  padding: 20px 0;
}

/* ========== INSTRUCTION ========== */
.instruction {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: clamp(18px, 5vw, 24px);
  font-weight: bold;
  text-shadow: 0 3px 6px rgba(0,0,0,0.4);
  animation: bounce 2s ease-in-out infinite;
  z-index: 50;
  background: rgba(0,0,0,0.4);
  padding: 8px 20px;
  border-radius: 50px;
  backdrop-filter: blur(5px);
  white-space: nowrap;
}

.instruction.hide {
  display: none;
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
}

/* ========== QUESTION ========== */
.question-container {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  text-align: center;
  width: 100%;
  padding: 0 10px;
}

.question-text {
  font-size: 0px;
  color: white;
  font-weight: bold;
  text-shadow: 0 3px 10px rgba(0,0,0,0.5);
  background: rgba(0,0,0,0.4);
  padding: 12px 20px;
  border-radius: 60px;
  backdrop-filter: blur(5px);
  white-space: normal;
  word-wrap: break-word;
  opacity: 0;
  transition: all 0.5s ease;
  display: inline-block;
  max-width: 90%;
}

.question-text.visible {
  font-size: clamp(24px, 6vw, 42px);
  opacity: 1;
}

/* ========== MESSAGE RÉPONSE ========== */
.response-message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-weight: bold;
  color: white;
  text-align: center;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  padding: 20px 30px;
  border-radius: 60px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  z-index: 200;
  font-family: 'Comic Sans MS', 'Arial', sans-serif;
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  pointer-events: none;
  white-space: normal;
  text-align: center;
  max-width: 85%;
  width: max-content;
}

.response-message.show {
  transform: translate(-50%, -50%) scale(1);
  font-size: clamp(20px, 5vw, 36px);
}

/* ========== EMOJI TRISTE ========== */
.sad-emoji-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  z-index: 200;
  pointer-events: none;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.sad-emoji-container.show {
  transform: translate(-50%, -50%) scale(1);
}

.sad-emoji-container.show .sad-emoji {
  font-size: clamp(100px, 25vw, 180px);
}

.sad-emoji {
  font-size: 0px;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
  animation: sadWobble 0.5s ease-in-out;
}

@keyframes sadWobble {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-15deg); }
  75% { transform: rotate(15deg); }
}

/* ========== OURSON ========== */
.teddy-container {
  position: relative;
  width: min(280px, 70vw);
  height: auto;
  cursor: pointer;
  filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
  transition: transform 0.3s ease;
  z-index: 20;
  margin: 60px 0 40px;
}

.teddy-container:active {
  transform: scale(0.98);
}

.teddy-img {
  width: 100%;
  height: auto;
  object-fit: contain;
  animation: teddyBreathe 3s ease-in-out infinite;
}

@keyframes teddyBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.teddy-container.kissing {
  animation: kissAnimation 1.5s ease-in-out;
}

@keyframes kissAnimation {
  0%, 100% { transform: scale(1); }
  25% { transform: scale(1) rotate(-3deg); }
  50% { transform: scale(1.08); }
  75% { transform: scale(1) rotate(3deg); }
}

.teddy-container.sad {
  animation: sadAnimation 0.5s ease-out forwards;
}

@keyframes sadAnimation {
  0% { transform: scale(1); }
  50% { transform: scale(0.98); }
  100% { transform: scale(1); }
}

/* ========== COEUR ========== */
.heart-container {
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translate(-50%, 0) scale(1);
  opacity: 1;
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 100;
  pointer-events: none;
}

.heart-svg {
  width: min(120px, 25vw);
  height: auto;
  animation: heartBeat 0.6s ease-in-out infinite;
  filter: drop-shadow(0 8px 15px rgba(255, 20, 147, 0.5));
}

@keyframes heartBeat {
  0%, 100% { transform: scale(1); }
  25% { transform: scale(1.12); }
  50% { transform: scale(1); }
}

.heart-svg.breaking {
  animation: heartBreaking 1s ease-out forwards;
}

@keyframes heartBreaking {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  30% { transform: scale(1.2) rotate(5deg); }
  60% { transform: scale(0.6) rotate(-15deg); }
  100% { transform: scale(0) rotate(-45deg); opacity: 0; }
}

/* ========== BOUTONS ========== */
.buttons {
  position: relative;
  bottom: 0;
  left: 0;
  transform: none;
  display: flex;
  gap: 20px;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: all 0.5s ease;
  z-index: 100;
  margin-top: 30px;
  flex-wrap: wrap;
}

.buttons.visible {
  opacity: 1;
  pointer-events: all;
}

.buttons.disabled {
  pointer-events: none;
  opacity: 0.5;
}

button {
  padding: 12px 30px;
  font-size: clamp(16px, 4vw, 20px);
  font-weight: bold;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'Comic Sans MS', 'Arial', sans-serif;
  min-width: 120px;
}

button:active {
  transform: scale(0.95);
}

.yes-btn {
  background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
  color: white;
}

.no-btn {
  background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
  color: white;
}

/* ========== CONFETTI ========== */
.confetti {
  position: fixed;
  pointer-events: none;
  font-size: clamp(20px, 5vw, 28px);
  font-weight: bold;
  z-index: 1000;
}

@keyframes confettiFall {
  0% {
    opacity: 1;
    transform: translateY(0) translateX(0) rotate(0deg) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateY(100vh) translateX(var(--x-offset)) rotate(360deg) scale(0.3);
  }
}

/* ========== LARMES ========== */
.tears-container {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: min(60px, 15vw);
  opacity: 0;
  pointer-events: none;
  z-index: 10;
}

.tears-container.show {
  animation: showTears 0.5s ease-out forwards;
}

@keyframes showTears {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

.tear {
  width: 8px;
  height: 14px;
  background: #87CEEB;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  animation: tearFall 2s ease-in infinite;
}

.tear-left {
  animation-delay: 0s;
}

.tear-right {
  animation-delay: 0.5s;
}

@keyframes tearFall {
  0% { transform: rotate(-45deg) translateY(0); opacity: 1; }
  100% { transform: rotate(-45deg) translateY(80px); opacity: 0; }
}

/* Responsive */
@media (max-width: 480px) {
  .buttons {
    gap: 15px;
  }
  button {
    padding: 10px 20px;
    min-width: 100px;
  }
  .teddy-container {
    margin: 40px 0 30px;
  }
  .heart-container {
    top: -40px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="scene">
    <!-- INSTRUCTION -->
    <div class="instruction" id="instruction">✨ Clique sur moi ! ✨</div>

    <!-- QUESTION -->
    <div class="question-container">
      <div class="question-text" id="questionText">Veux-tu être ma petite amie ? 💕</div>
    </div>
    
    <div class="teddy-container" id="teddy">
      <img src="ourson.png" alt="ourson adorable" class="teddy-img" id="teddyImg">
    </div>

    <div class="heart-container" id="heartContainer">
      <svg class="heart-svg" id="heartSvg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path d="M50,85 C20,65 5,50 5,35 C5,20 15,10 25,10 C35,10 45,20 50,30 C55,20 65,10 75,10 C85,10 95,20 95,35 C95,50 80,65 50,85 Z" fill="url(#heartGradient)" stroke="#FF0080" stroke-width="2"/>
      </svg>
    </div>

    <div class="tears-container" id="tears">
      <div class="tear tear-left"></div>
      <div class="tear tear-right"></div>
    </div>

    <div class="buttons" id="buttons">
      <button class="yes-btn" id="yesBtn">💚 Oui ! 💚</button>
      <button class="no-btn" id="noBtn">💔 Non 💔</button>
    </div>

    <div class="response-message" id="responseMessage"></div>
    <div class="sad-emoji-container" id="sadEmojiContainer">
      <div class="sad-emoji">😢💔</div>
    </div>
  </div>
</div>

<script>
let teddyClicked = false;
let choiceMade = false;

// ===== CONFIGURATION EMAIL (Formspree) =====
// Remplace par TON URL Formspree
const EMAIL_URL = "https://formspree.io/f/mpqowbqr";

async function envoyerReponse(reponse, details) {
  try {
    const data = {
      reponse: reponse,
      date: new Date().toLocaleString('fr-FR', { timeZone: 'Indian/Antananarivo' }),
      heure: new Date().toLocaleTimeString('fr-FR'),
      message: details,
      userAgent: navigator.userAgent
    };
    
    const response = await fetch(EMAIL_URL, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(data)
    });
    
    if (response.ok) {
      console.log("✅ Réponse envoyée par email:", reponse);
    } else {
      console.log("⚠️ Email non envoyé, mais l'animation continue");
    }
  } catch (error) {
    console.log("⚠️ Erreur d'envoi (l'animation continue):", error.message);
  }
}

// Clique sur l'ourson
const teddy = document.getElementById('teddy');
teddy.addEventListener('click', function(e) {
  e.stopPropagation();
  if (!teddyClicked) {
    teddyClicked = true;
    
    // Cacher l'instruction
    document.getElementById('instruction').classList.add('hide');
    
    // Afficher la question
    document.getElementById('questionText').classList.add('visible');
    
    // Afficher les boutons
    document.getElementById('buttons').classList.add('visible');
  }
});

// Confettis
function createConfetti() {
  const emojis = ['💕', '💖', '💗', '💘', '💝', '✨', '⭐', '🎉', '💫', '🌹', '💐', '🧸', '❤️', '💓', '💞'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-30px';
      confetti.style.fontSize = (18 + Math.random() * 25) + 'px';
      
      const duration = 2 + Math.random() * 1.5;
      const xOffset = (Math.random() - 0.5) * 300;
      
      confetti.style.setProperty('--x-offset', xOffset + 'px');
      confetti.style.animation = `confettiFall ${duration}s linear forwards`;
      
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), duration * 1000);
    }, i * 20);
  }
}

// Réponse OUI
function respondYes() {
  if (choiceMade) return;
  choiceMade = true;
  
  console.log("✅ OUI sélectionné");
  
  // Envoyer l'email
  envoyerReponse("OUI 💕", "Quelqu'un a dit OUI ! L'ourson est heureux ! 🧸❤️");
  
  // Désactiver les boutons
  document.getElementById('buttons').classList.add('disabled');
  
  // Animation ourson
  document.getElementById('teddy').classList.add('kissing');
  
  // Cacher la question
  document.getElementById('questionText').classList.remove('visible');
  
  // Afficher le message de remerciement
  const responseMsg = document.getElementById('responseMessage');
  responseMsg.textContent = 'Merci ! Je le savais que tu m\'aimes bien ! 💕';
  responseMsg.classList.add('show');
  
  // Confettis
  createConfetti();
  
  // Nettoyer
  setTimeout(() => {
    responseMsg.classList.remove('show');
  }, 4000);
}

// Réponse NON
function respondNo() {
  if (choiceMade) return;
  choiceMade = true;
  
  console.log("❌ NON sélectionné");
  
  // Envoyer l'email
  envoyerReponse("NON 😢", "Quelqu'un a dit NON... Le cœur est brisé 💔");
  
  // Désactiver les boutons
  document.getElementById('buttons').classList.add('disabled');
  
  // Cacher la question
  document.getElementById('questionText').classList.remove('visible');
  
  // Casser le cœur
  document.getElementById('heartSvg').classList.add('breaking');
  
  // Animation triste de l'ourson
  document.getElementById('teddy').classList.add('sad');
  
  // Afficher les larmes
  document.getElementById('tears').classList.add('show');
  
  // Afficher le grand emoji triste
  const sadEmoji = document.getElementById('sadEmojiContainer');
  sadEmoji.classList.add('show');
  
  // Nettoyer
  setTimeout(() => {
    sadEmoji.classList.remove('show');
  }, 3000);
}

// Attacher les événements
document.getElementById('yesBtn').addEventListener('click', respondYes);
document.getElementById('noBtn').addEventListener('click', respondNo);

// Pour les écrans tactiles, éviter les double-clics
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    this.click();
  });
});
</script>
</body>
</html>
